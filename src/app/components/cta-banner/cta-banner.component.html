<section class="cta-banner-section">
  <div class="cta-banner-container">

    <h2 class="cta-banner-text">
      {{ langService.text().ctaBannerText }}
    </h2>

    <div class="cta-banner-action">
      <!-- O botão agora é o elemento principal, disparando o modal global -->
      <button (click)="modalService.open()" class="cta-button">
        <span class="cta-text">
          {{ langService.text().navCta }}
        </span>

        <!-- Padronizado com a estrutura de círculo para a seta -->
        <span class="arrow-circle">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
            <path fill-rule="evenodd" d="M1 8a.5.5 0 0 1 .5-.5h11.793l-3.147-3.146a.5.5 0 0 1 .708-.708l4 4a.5.5 0 0 1 0 .708l-4 4a.5.5 0 0 1-.708-.708L13.293 8.5H1.5A.5.5 0 0 1 1 8z"/>
          </svg>
        </span>
      </button>
    </div>

  </div>
</section>
